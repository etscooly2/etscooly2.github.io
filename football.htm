<!DOCTYPE html>
<html>
<head>
    <title>Pro Soccer Tournament</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        #game-ui { padding: 10px; background: #222; }
        canvas { background: #2e7d32; border: 4px solid white; display: block; margin: 10px auto; }
        .stats { display: inline-block; margin: 0 20px; }
    </style>
</head>
<body>
    <div id="game-ui">
        <h2>Pro Soccer Cup 2026</h2>
        <div class="stats">Team A: <span id="scoreA">0</span></div>
        <div class="stats">Team B: <span id="scoreB">0</span></div>
        <p>Use Mouse to Move | Click to Shoot/Pass</p>
    </div>
    <canvas id="field" width="800" height="500"></canvas>

<script>
    const canvas = document.getElementById("field");
    const ctx = canvas.getContext("2d");
    
    let game = { scoreA: 0, scoreB: 0, time: 90 };
    let player = { x: 400, y: 250, team: 'A' };
    let ball = { x: 400, y: 250, vx: 0, vy: 0, speed: 0 };

    // Input Handling
    window.addEventListener("mousemove", (e) => {
        let rect = canvas.getBoundingClientRect();
        player.x = e.clientX - rect.left;
        player.y = e.clientY - rect.top;
    });

    window.addEventListener("mousedown", () => {
        // Shooting logic: apply force to ball
        ball.vx = (Math.random() - 0.5) * 20;
        ball.vy = (Math.random() - 0.5) * 20;
    });

    function update() {
        // Ball physics
        ball.x += ball.vx;
        ball.y += ball.vy;
        ball.vx *= 0.98; // Friction
        ball.vy *= 0.98;

        // Collision with walls
        if (ball.x < 0 || ball.x > 800) ball.vx *= -1;
        if (ball.y < 0 || ball.y > 500) ball.vy *= -1;

        // Goal logic
        if (ball.x < 10 && ball.y > 200 && ball.y < 300) { game.scoreB++; resetBall(); }
        if (ball.x > 790 && ball.y > 200 && ball.y < 300) { game.scoreA++; resetBall(); }
        
        document.getElementById('scoreA').innerText = game.scoreA;
        document.getElementById('scoreB').innerText = game.scoreB;
    }

    function resetBall() { ball.x = 400; ball.y = 250; ball.vx = 0; ball.vy = 0; }

    function draw() {
        ctx.clearRect(0, 0, 800, 500);
        
        // Pitch
        ctx.strokeStyle = "white"; ctx.lineWidth = 3;
        ctx.strokeRect(0, 200, 10, 100); // Goal A
        ctx.strokeRect(790, 200, 10, 100); // Goal B
        ctx.beginPath(); ctx.moveTo(400, 0); ctx.lineTo(400, 500); ctx.stroke();
        
        // Objects
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "blue"; ctx.fillRect(player.x-10, player.y-10, 20, 20); // Player
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
