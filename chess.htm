<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess: etscooly Edition</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #1a252f; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; overflow: hidden; }
        
        /* Start Screen Styling */
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #2c3e50, #1a252f); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; transition: 0.5s; }
        .menu-box { background: rgba(52, 73, 94, 0.9); padding: 40px; border-radius: 15px; border: 2px solid #3498db; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .diff-btn { display: block; width: 250px; padding: 15px; margin: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .lvl-1 { background: #2ecc71; color: white; }
        .lvl-2 { background: #f1c40f; color: #1a252f; }
        .lvl-3 { background: #e67e22; color: white; }
        .lvl-4 { background: #e74c3c; color: white; }
        .lvl-5 { background: #9b59b6; color: white; }
        .diff-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* Game Layout */
        .game-container { display: flex; gap: 30px; align-items: flex-start; visibility: hidden; }
        .board-wrapper { position: relative; padding: 25px; background: #34495e; border-radius: 5px; }
        .board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 2px solid #2c3e50; }
        .square { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; font-size: 40px; cursor: pointer; position: relative; }
        .white-sq { background-color: #ecf0f1; }
        .black-sq { background-color: #95a5a6; }
        .selected { background-color: #f1c40f !important; }
        .last-move { background-color: rgba(241, 196, 15, 0.3) !important; }
        .p-white { color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .p-black { color: #000000; }
        .info-panel { width: 220px; padding: 20px; background: #2c3e50; border-radius: 8px; }
        .clock { font-size: 2rem; font-family: monospace; background: #000; padding: 10px; border-radius: 5px; text-align: center; margin: 5px 0; color: #e74c3c; border: 2px solid #444; }
        .btn { padding: 12px; width: 100%; cursor: pointer; background: #3498db; border: none; color: white; font-weight: bold; margin-top: 10px; border-radius: 4px; }
        #win-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 300; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="menu-box">
            <h1 style="font-size: 2.5rem; margin-bottom: 20px;">CHESS BLITZ</h1>
            <p style="color: #bdc3c7; margin-bottom: 20px;">Select AI Difficulty to Begin</p>
            <button class="diff-btn lvl-1" onclick="startGame(1)">Level 1: Beginner</button>
            <button class="diff-btn lvl-2" onclick="startGame(2)">Level 2: Casual</button>
            <button class="diff-btn lvl-3" onclick="startGame(3)">Level 3: Intermediate</button>
            <button class="diff-btn lvl-4" onclick="startGame(4)">Level 4: Expert</button>
            <button class="diff-btn lvl-5" onclick="startGame(5)">Level 5: Grandmaster</button>
        </div>
    </div>

    <div id="win-screen">
        <h1 id="win-text" style="font-size: 3rem; color: #f1c40f;">CHECKMATE</h1>
        <button class="btn" style="width: 200px;" onclick="location.reload()">MAIN MENU</button>
    </div>

    <div class="game-container" id="game-ui">
        <div class="board-wrapper" id="board-container"></div>
        <div class="info-panel">
            <div id="turn-display" style="text-align: center; font-weight: bold; background: #2ecc71; padding: 8px; border-radius: 3px; margin-bottom: 10px;">WHITE'S TURN</div>
            <div style="font-size: 0.8rem; color: #bdc3c7;">WHITE</div>
            <div class="clock" id="white-clock">20:00</div>
            <div style="font-size: 0.8rem; color: #bdc3c7;">BLACK (AI)</div>
            <div class="clock" id="black-clock">20:00</div>
            <div id="diff-tag" style="margin-top: 15px; text-align: center; color: #f1c40f; font-weight: bold;">Difficulty: Lvl 3</div>
            <button class="btn" style="background: #e67e22;" onclick="location.reload()">QUIT GAME</button>
        </div>
    </div>

<script>
    let board = [];
    let turn = 'white';
    let selected = null;
    let validMoves = [];
    let isGameOver = true; // Started as true until menu selection
    let aiLevel = 3;
    let lastMove = null;
    let timeLeft = { white: 1200, black: 1200 };

    const weights = { p: 10, n: 30, b: 35, r: 50, q: 90, k: 999 };

    function startGame(level) {
        aiLevel = level;
        isGameOver = false;
        document.getElementById('start-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-ui').style.visibility = 'visible';
            document.getElementById('diff-tag').textContent = `Difficulty: Level ${level}`;
            init();
        }, 500);
    }

    setInterval(() => {
        if (!isGameOver) {
            timeLeft[turn]--;
            updateClocks();
            if (timeLeft[turn] <= 0) showWin(turn === 'white' ? 'black' : 'white');
        }
    }, 1000);

    function updateClocks() {
        const fmt = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
        document.getElementById('white-clock').textContent = fmt(timeLeft.white);
        document.getElementById('black-clock').textContent = fmt(timeLeft.black);
    }

    const glyphs = {
        white: { r: '♖', n: '♘', b: '♗', q: '♕', k: '♔', p: '♙' },
        black: { r: '♜', n: '♞', b: '♝', q: '♛', k: '♚', p: '♟' }
    };

    function init() {
        const layout = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
        for (let r = 0; r < 8; r++) {
            board[r] = [];
            for (let c = 0; c < 8; c++) {
                let piece = null;
                if (r === 0) piece = { type: layout[c], color: 'black' };
                else if (r === 1) piece = { type: 'p', color: 'black' };
                else if (r === 6) piece = { type: 'p', color: 'white' };
                else if (r === 7) piece = { type: layout[c], color: 'white' };
                board[r][c] = piece;
            }
        }
        render();
    }

    function render() {
        const boardEl = document.getElementById('board-container');
        boardEl.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'board';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const sq = document.createElement('div');
                sq.className = `square ${(r + c) % 2 === 0 ? 'white-sq' : 'black-sq'}`;
                if (selected?.r === r && selected?.c === c) sq.classList.add('selected');
                if (lastMove && ((lastMove.fr === r && lastMove.fc === c) || (lastMove.tr === r && lastMove.tc === c))) sq.classList.add('last-move');
                const p = board[r][c];
                if (p) {
                    sq.textContent = glyphs[p.color][p.type];
                    sq.classList.add(p.color === 'white' ? 'p-white' : 'p-black');
                }
                if (validMoves.find(m => m.r === r && m.c === c)) {
                    const dot = document.createElement('div');
                    dot.style = "width:12px; height:12px; background:rgba(0,0,0,0.15); border-radius:50%;";
                    sq.appendChild(dot);
                }
                sq.onclick = () => handleClick(r, c);
                grid.appendChild(sq);
            }
        }
        boardEl.appendChild(grid);
    }

    function handleClick(r, c) {
        if (isGameOver || turn === 'black') return;
        const move = validMoves.find(m => m.r === r && m.c === c);
        if (move && selected) {
            executeMove(selected.r, selected.c, r, c);
            selected = null; validMoves = []; render();
            if(!isGameOver) setTimeout(makeAIMove, 600);
        } else if (board[r][c]?.color === turn) {
            selected = { r, c };
            calculateValidMoves(r, c);
            render();
        }
    }

    function makeAIMove() {
        let moves = getAllMoves('black');
        if (moves.length === 0) return;

        let bestMove;
        if (aiLevel === 1) {
            bestMove = moves[Math.floor(Math.random() * moves.length)];
        } else {
            moves.forEach(m => {
                m.score = board[m.tr][m.tc] ? weights[board[m.tr][m.tc].type] : 0;
                if (aiLevel >= 3) m.score += (m.tr * 0.1); // Prefer moving forward
                if (aiLevel >= 5 && (m.tr >= 3 && m.tr <= 4 && m.tc >= 3 && m.tc <= 4)) m.score += 5; // Center control
            });
            moves.sort((a, b) => b.score - a.score);
            const randomness = Math.max(1, 6 - aiLevel);
            bestMove = moves[Math.floor(Math.random() * randomness)];
        }
        executeMove(bestMove.fr, bestMove.fc, bestMove.tr, bestMove.tc);
        render();
    }

    function getAllMoves(color) {
        let moves = [];
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                if (board[r][c]?.color === color) {
                    for (let tr = 0; tr < 8; tr++) {
                        for (let tc = 0; tc < 8; tc++) {
                            if (validateMove(r, c, tr, tc)) moves.push({fr: r, fc: c, tr, tc});
                        }
                    }
                }
            }
        }
        return moves;
    }

    function calculateValidMoves(fr, fc) {
        validMoves = [];
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                if (validateMove(fr, fc, r, c)) validMoves.push({ r, c });
            }
        }
    }

    function validateMove(fr, fc, tr, tc) {
        const p = board[fr][fc];
        const target = board[tr][tc];
        if (target?.color === p.color) return false;
        const dr = Math.abs(tr - fr), dc = Math.abs(tc - fc);
        switch (p.type) {
            case 'p':
                const dir = p.color === 'white' ? -1 : 1;
                if (fc === tc && !target) {
                    if (tr === fr + dir) return true;
                    if (fr === (p.color === 'white' ? 6 : 1) && tr === fr + 2 * dir && !board[fr + dir][fc]) return true;
                }
                return (dr === 1 && dc === 1 && !!target);
            case 'n': return (dr === 2 && dc === 1) || (dr === 1 && dc === 2);
            case 'b': return dr === dc && isPathClear(fr, fc, tr, tc);
            case 'r': return (fr === tr || fc === tc) && isPathClear(fr, fc, tr, tc);
            case 'q': return (dr === dc || fr === tr || fc === tc) && isPathClear(fr, fc, tr, tc);
            case 'k': return (dr <= 1 && dc <= 1);
        }
        return false;
    }

    function isPathClear(fr, fc, tr, tc) {
        const rDir = Math.sign(tr - fr), cDir = Math.sign(tc - fc);
        let r = fr + rDir, c = fc + cDir;
        while (r !== tr || c !== tc) { if (board[r][c]) return false; r += rDir; c += cDir; }
        return true;
    }

    function executeMove(fr, fc, tr, tc) {
        const p = board[fr][fc];
        if (board[tr][tc]?.type === 'k') showWin(p.color);
        lastMove = { fr, fc, tr, tc };
        board[tr][tc] = p; board[fr][fc] = null;
        if (p.type === 'p' && (tr === 0 || tr === 7)) board[tr][tc] = { type: 'q', color: turn };
        turn = turn === 'white' ? 'black' : 'white';
        const display = document.getElementById('turn-display');
        display.textContent = `${turn.toUpperCase()}'S TURN`;
        display.style.background = turn === 'white' ? '#2ecc71' : '#e74c3c';
    }

    function showWin(winner) {
        isGameOver = true;
        document.getElementById('win-screen').style.display = 'flex';
        document.getElementById('win-text').textContent = winner.toUpperCase() + " WINS!";
    }
</script>
</body>
</html>
