<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Arena Clean</title>
<style>
body {
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

#container {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:10px;
}

canvas {
    background:#000;
    border:2px solid #333;
    border-radius:10px;
}

button {
    padding:10px;
    margin:5px;
}
</style>
</head>
<body>

<h1>Snake Arena</h1>
<p>Score: <span id="score">0</span></p>

<button onclick="spawnAI()">Spawn AI</button>
<button onclick="changeSkin()">Change Skin</button>

<div id="container">
    <canvas id="game" width="400" height="400"></canvas>
    <canvas id="minimap" width="150" height="150"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const mini = document.getElementById("minimap");
const mctx = mini.getContext("2d");

const grid = 20;

let snake;
let aiSnakes = [];
let foods = [];
let particles = [];

let score = 0;
let speed = 6;
let count = 0;

// SKINS
let skins = [
    {player:"#00ff88", body:"#00cc66", ai:"#ff4444", food:"#ffd700"},
    {player:"#00aaff", body:"#0077cc", ai:"#ff00aa", food:"#00ffcc"},
    {player:"#ffffff", body:"#aaaaaa", ai:"#ff8800", food:"#ff4444"}
];
let currentSkin = 0;

function rand(){
    return Math.floor(Math.random()*20)*grid;
}

function updateScore(){
    document.getElementById("score").innerText = score;
}

function reset(){
    snake = {
        x:160,y:160,
        dx:grid,dy:0,
        cells:[],maxCells:4
    };
    aiSnakes = [];
    foods = [];
    particles = [];

    // START WITH MULTIPLE FOOD
    for(let i=0;i<5;i++){
        foods.push({x:rand(),y:rand()});
    }

    score = 0;
    speed = 6;
    updateScore();
}

function spawnAI(){
    let size = Math.floor(Math.random()*5)+3;

    aiSnakes.push({
        x:rand(),y:rand(),
        dx:grid,dy:0,
        cells:[],
        maxCells:size
    });
}

function changeSkin(){
    currentSkin = (currentSkin+1)%skins.length;
}

// PARTICLES
function createParticles(x,y,color){
    for(let i=0;i<10;i++){
        particles.push({
            x,y,
            dx:(Math.random()-0.5)*4,
            dy:(Math.random()-0.5)*4,
            life:30,
            color
        });
    }
}

// AI MOVE
function getMove(ai){
    let dirs = [
        {dx:grid,dy:0},
        {dx:-grid,dy:0},
        {dx:0,dy:grid},
        {dx:0,dy:-grid}
    ];

    let best = dirs[0];
    let bestDist = Infinity;

    for (let d of dirs){
        let nx = ai.x + d.dx;
        let ny = ai.y + d.dy;

        if (nx<0) nx=canvas.width-grid;
        if (ny<0) ny=canvas.height-grid;
        if (nx>=canvas.width) nx=0;
        if (ny>=canvas.height) ny=0;

        let dist = Infinity;

        foods.forEach(f=>{
            let d2 = Math.abs(nx-f.x)+Math.abs(ny-f.y);
            if (d2 < dist) dist = d2;
        });

        if (dist < bestDist){
            bestDist = dist;
            best = d;
        }
    }

    return best;
}

function wrap(s){
    if (s.x<0) s.x=canvas.width-grid;
    if (s.y<0) s.y=canvas.height-grid;
    if (s.x>=canvas.width) s.x=0;
    if (s.y>=canvas.height) s.y=0;
}

function drawCell(x,y,color){
    ctx.fillStyle=color;
    ctx.fillRect(x,y,grid-1,grid-1);
}

// EXPLODE
function explodeSnake(s,color){
    s.cells.forEach(c=>{
        foods.push({x:c.x,y:c.y});
        createParticles(c.x,c.y,color);
    });
}

// MINIMAP (separate canvas)
function drawMinimap(){
    mctx.clearRect(0,0,mini.width,mini.height);

    let scale = mini.width / canvas.width;

    // player
    mctx.fillStyle = "lime";
    mctx.fillRect(snake.x*scale, snake.y*scale, 4,4);

    // ai
    mctx.fillStyle = "red";
    aiSnakes.forEach(ai=>{
        mctx.fillRect(ai.x*scale, ai.y*scale, 3,3);
    });

    // food
    mctx.fillStyle = "yellow";
    foods.forEach(f=>{
        mctx.fillRect(f.x*scale, f.y*scale, 2,2);
    });
}

// LOOP
function loop(){
    requestAnimationFrame(loop);

    if (++count < speed) return;
    count = 0;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let skin = skins[currentSkin];

    // PLAYER
    snake.x += snake.dx;
    snake.y += snake.dy;
    wrap(snake);

    snake.cells.unshift({x:snake.x,y:snake.y});
    if (snake.cells.length > snake.maxCells) snake.cells.pop();

    snake.cells.forEach((c,i)=>{
        drawCell(c.x,c.y, i===0 ? skin.player : skin.body);
    });

    // AI
    aiSnakes.forEach(ai=>{
        let move = getMove(ai);
        ai.dx = move.dx;
        ai.dy = move.dy;

        ai.x += ai.dx;
        ai.y += ai.dy;
        wrap(ai);

        ai.cells.unshift({x:ai.x,y:ai.y});
        if (ai.cells.length > ai.maxCells) ai.cells.pop();
    });

    // COLLISION
    let all = [snake, ...aiSnakes];

    for (let s1 of all){
        for (let s2 of all){
            if (s1===s2) continue;

            for (let c of s2.cells){
                if (s1.x===c.x && s1.y===c.y){
                    if (s1.maxCells > s2.maxCells){
                        explodeSnake(s2, skin.ai);
                        aiSnakes = aiSnakes.filter(a=>a!==s2);
                    } else {
                        explodeSnake(s1, skin.player);
                        if (s1===snake){
                            reset();
                            return;
                        } else {
                            aiSnakes = aiSnakes.filter(a=>a!==s1);
                        }
                    }
                }
            }
        }
    }

    // DRAW AI
    aiSnakes.forEach(ai=>{
        ai.cells.forEach(c=>drawCell(c.x,c.y,skin.ai));
    });

    // FOOD
    foods.forEach(f=>{
        drawCell(f.x,f.y,skin.food);
    });

    // EAT
    foods = foods.filter(f=>{
        if (snake.x===f.x && snake.y===f.y){
            snake.maxCells++;
            score++;
            updateScore();
            return false;
        }
        for (let ai of aiSnakes){
            if (ai.x===f.x && ai.y===f.y){
                ai.maxCells++;
                return false;
            }
        }
        return true;
    });

    // KEEP FOOD ALIVE (IMPORTANT FIX)
    if (foods.length < 5){
        foods.push({x:rand(),y:rand()});
    }

    // PARTICLES
    particles = particles.filter(p=>{
        p.x += p.dx;
        p.y += p.dy;
        p.life--;

        ctx.fillStyle = p.color;
        ctx.fillRect(p.x,p.y,2,2);

        return p.life > 0;
    });

    drawMinimap();
}

// CONTROLS
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft" && snake.dx===0){
        snake.dx=-grid; snake.dy=0;
    } else if(e.key==="ArrowUp" && snake.dy===0){
        snake.dy=-grid; snake.dx=0;
    } else if(e.key==="ArrowRight" && snake.dx===0){
        snake.dx=grid; snake.dy=0;
    } else if(e.key==="ArrowDown" && snake.dy===0){
        snake.dy=grid; snake.dx=0;
    }
});

reset();
requestAnimationFrame(loop);
</script>

</body>
</html>
