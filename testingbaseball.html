<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Baseball Reaction Trainer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #222; font-family: sans-serif; }
        #canvas { display: block; cursor: crosshair; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; }
        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: lime; font-size: 48px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Baseball Reaction Trainer</h2>
        <p>Press <b>SPACE</b> to start a pitch</p>
        <label>Speed: <span id="speedVal">90</span> MPH</label><br>
        <input type="range" id="speedSlider" min="20" max="105.8" step="0.1" value="90" style="width: 200px;">
        <p id="status">Waiting...</p>
    </div>

    <div id="message">SUCCEEDED!</div>
    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('speedSlider');
    const speedVal = document.getElementById('speedVal');
    const status = document.getElementById('status');
    const message = document.getElementById('message');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let ball = { x: 50, y: canvas.height/2, radius: 20, active: false, speed: 0 };
    let animationId;

    slider.oninput = () => speedVal.innerText = slider.value;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Draw Plate
        ctx.fillStyle = "white";
        ctx.fillRect(canvas.width - 50, canvas.height/2 - 50, 10, 100);
        
        // Draw Ball
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = "red";
        ctx.fill();
        ctx.closePath();
    }

    function startPitch() {
        if(ball.active) return;
        message.style.display = 'none';
        ball.x = 50;
        ball.active = true;
        ball.speed = parseFloat(slider.value);
        status.innerText = "Pitch incoming!";
        
        let startTime = performance.now();
        
        function animate(now) {
            let elapsed = (now - startTime) / 1000;
            // Simplified: 105.8mph takes ~0.4s to cross the screen
            let speedFactor = (ball.speed / 105.8) * 1500; 
            ball.x = 50 + (elapsed * speedFactor);

            draw();

            if (ball.x < canvas.width - 50 && ball.active) {
                animationId = requestAnimationFrame(animate);
            } else if (ball.active) {
                ball.active = false;
                status.innerText = "Missed!";
            }
        }
        animationId = requestAnimationFrame(animate);
    }

    // Touch/Click interaction
    canvas.addEventListener('mousedown', (e) => {
        let dist = Math.hypot(e.clientX - ball.x, e.clientY - ball.y);
        if (dist < ball.radius + 20 && ball.active) {
            ball.active = false;
            cancelAnimationFrame(animationId);
            message.style.display = 'block';
            status.innerText = "You hit it!";
        }
    });

    window.addEventListener('keydown', (e) => { if(e.code === 'Space') startPitch(); });

    draw();
</script>
</body>
</html>
