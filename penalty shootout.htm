<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DLS - Penalty Challenge</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        #ui-overlay { position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .top-bar { display: flex; justify-content: space-between; padding: 20px; color: white; font-weight: bold; font-size: 24px; text-shadow: 2px 2px 4px #000; }
        .score-box { background: rgba(0,0,0,0.6); padding: 5px 20px; border-left: 5px solid #00ff00; }
        
        .controls { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 20px; pointer-events: auto; }
        .btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.8); background: rgba(0,0,0,0.4); color: white; font-size: 30px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        .btn:active { transform: scale(0.9); background: rgba(255,255,255,0.4); }
        .btn-a { border-color: #ff4444; } /* Power Shot */
        .btn-b { border-color: #4444ff; } /* Placement Shot */
        
        .direction-buttons { position: absolute; bottom: 40px; left: 40px; display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; pointer-events: auto; }
        .dir-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; cursor: pointer; font-weight: bold; border-radius: 10px; }
        .selected-dir { background: #f1c40f !important; color: black; }
        
        #feedback { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 60px; font-weight: bold; color: #fff; text-shadow: 4px 4px 10px #000; display: none; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="top-bar">
            <div class="score-box">DLS MOBILE | SCORE: <span id="score">0</span></div>
            <div id="timer">90:00</div>
        </div>
        <div id="feedback">GOAL!</div>
    </div>

    <div class="direction-buttons">
        <button class="dir-btn" onclick="setDir(-2, this)">LEFT</button>
        <button class="dir-btn selected-dir" onclick="setDir(0, this)">MID</button>
        <button class="dir-btn" onclick="setDir(2, this)">RIGHT</button>
    </div>

    <div class="controls">
        <button class="btn btn-b" onclick="shoot('low')">B</button>
        <button class="btn btn-a" onclick="shoot('high')">A</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, ball, keeper, player;
        let score = 0;
        let isMoving = false;
        let targetX = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2.5, 12); // DLS style low-behind camera
            camera.lookAt(0, 1, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 15, 5);
            light.castShadow = true;
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x666666));

            // Pitch with DLS stripes
            const pitchGeo = new THREE.PlaneGeometry(30, 60);
            const pitchMat = new THREE.MeshPhongMaterial({ color: 0x27ae60 });
            const pitch = new THREE.Mesh(pitchGeo, pitchMat);
            pitch.rotation.x = -Math.PI / 2;
            pitch.receiveShadow = true;
            scene.add(pitch);

            // Goal
            const goalFrame = new THREE.BoxGeometry(7, 3.5, 0.2);
            const goalMat = new THREE.MeshPhongMaterial({ color: 0xffffff, wireframe: true });
            const goal = new THREE.Mesh(goalFrame, goalMat);
            goal.position.set(0, 1.75, -15);
            scene.add(goal);

            // Ball
            ball = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), new THREE.MeshPhongMaterial({ color: 0xffffff }));
            ball.position.set(0, 0.3, 6);
            ball.castShadow = true;
            scene.add(ball);

            // Keeper
            keeper = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.5), new THREE.MeshPhongMaterial({ color: 0x00ffff }));
            keeper.position.set(0, 0.9, -14.5);
            scene.add(keeper);

            // Player Stand-in
            player = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.8, 0.4), new THREE.MeshPhongMaterial({ color: 0xff4444 }));
            player.position.set(0.5, 0.9, 7.5);
            scene.add(player);

            animate();
        }

        function setDir(x, btn) {
            targetX = x;
            document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('selected-dir'));
            btn.classList.add('selected-dir');
        }

        function shoot(type) {
            if (isMoving) return;
            isMoving = true;

            const keeperMove = [ -2.5, 0, 2.5 ][Math.floor(Math.random() * 3)];
            const height = type === 'high' ? 2.5 : 0.6;
            const speed = type === 'high' ? 0.8 : 0.5;

            let progress = 0;
            const shootInt = setInterval(() => {
                progress += 0.02;
                ball.position.z -= speed;
                ball.position.x += (targetX / 25);
                ball.position.y = 0.3 + (Math.sin(progress * Math.PI) * height);
                
                // Keeper AI movement
                if (ball.position.z < 0) {
                    keeper.position.x += (keeperMove - keeper.position.x) * 0.1;
                }

                if (ball.position.z <= -14.5) {
                    clearInterval(shootInt);
                    checkGoal(keeperMove, type);
                }
            }, 16);
        }

        function checkGoal(kPos, type) {
            const hitKeeper = Math.abs(targetX - kPos) < 1.5;
            const feedback = document.getElementById('feedback');
            
            feedback.style.display = "block";
            if (hitKeeper) {
                feedback.innerText = "SAVED!";
                feedback.style.color = "#ff4444";
            } else {
                score++;
                document.getElementById('score').innerText = score;
                feedback.innerText = "GOAL!";
                feedback.style.color = "#44ff44";
            }

            setTimeout(() => {
                feedback.style.display = "none";
                ball.position.set(0, 0.3, 6);
                keeper.position.x = 0;
                isMoving = false;
            }, 2000);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
